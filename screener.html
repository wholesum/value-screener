<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Value Desk – Cheapness Ranking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* same styles as before – no changes */
    * { box-sizing: border-box; }
    :root {
      --bg: #15181B;
      --surface: #1D2126;
      --surface-2: #242830;
      --hairline: #2C3138;
      --ink: #EAE6DD;
      --ink-muted: #8D949C;
      --cheap: #6FA98A;
      --cheap-dim: #3E5C4E;
      --rich: #C97B4A;
      --rich-dim: #5C4636;
      --gold: #C9A24A;
      --radius: 3px;
    }
    body { margin:0; background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; }
    .wrap { max-width:1100px; margin:0 auto; padding:24px 20px 60px; }
    .masthead { display:flex; justify-content:space-between; align-items:flex-end; border-bottom:1px solid var(--hairline); padding-bottom:16px; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
    .masthead h1 { font-family:'Fraunces',serif; font-weight:500; font-size:28px; margin:0; }
    .masthead .kicker { font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold); }
    .meta { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-muted); }
    .masthead-actions { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
    button.run { background:var(--gold); color:#20180A; border:none; font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600; padding:8px 16px; border-radius:var(--radius); cursor:pointer; }
    button.run:hover { opacity:0.85; }
    button.run:disabled { opacity:0.4; cursor:wait; }
    .loading-msg { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--gold); min-height:16px; }

    .search-bar { display:flex; gap:10px; align-items:center; background:var(--surface); border:1px solid var(--hairline); border-radius:var(--radius); padding:4px 4px 4px 14px; margin-bottom:24px; flex-wrap:wrap; }
    .search-bar input { flex:1; background:transparent; border:none; color:var(--ink); font-size:14px; padding:10px 0; min-width:160px; outline:none; }
    .search-bar input::placeholder { color:var(--ink-muted); }
    .search-bar button.go { background:var(--gold); color:#20180A; border:none; font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600; padding:8px 16px; border-radius:var(--radius); cursor:pointer; }
    .search-bar button.go:hover { opacity:0.85; }

    section.block { margin-bottom:36px; }
    h2.section-title { font-family:'Fraunces',serif; font-weight:500; font-size:20px; display:flex; align-items:baseline; gap:8px; margin:0 0 4px; }
    h2.section-title .num { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-muted); font-weight:400; }

    table.stock-table { width:100%; border-collapse:collapse; font-size:12px; }
    table.stock-table th { font-family:'IBM Plex Mono',monospace; font-size:9px; text-transform:uppercase; color:var(--ink-muted); text-align:left; padding:6px 8px; border-bottom:1px solid var(--hairline); }
    table.stock-table td { padding:7px 8px; border-bottom:1px solid var(--hairline); font-family:'IBM Plex Mono',monospace; font-size:11.5px; }
    .cheap-badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:10px; font-weight:600; }
    .cheap-badge.very-cheap { background:var(--cheap-dim); color:var(--cheap); }
    .cheap-badge.cheap { background:var(--cheap-dim); color:var(--cheap); opacity:0.7; }
    .cheap-badge.expensive { background:var(--rich-dim); color:var(--rich); }
    .cheap-badge.neutral { background:var(--hairline); color:var(--ink-muted); }

    .rating-badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:9px; font-weight:600; }
    .rating-badge.strong-buy { background:#1a4a1a; color:#6fcf97; }
    .rating-badge.buy { background:#1a4a1a; color:#6fcf97; opacity:0.7; }
    .rating-badge.hold { background:#4a4a1a; color:#f2c94a; }
    .rating-badge.sell { background:#4a1a1a; color:#eb5757; }
    .rating-badge.strong-sell { background:#4a1a1a; color:#eb5757; opacity:0.7; }
    .rating-badge.na { background:var(--hairline); color:var(--ink-muted); }

    .disclaimer { margin-top:40px; padding-top:16px; border-top:1px solid var(--hairline); font-size:11px; color:var(--ink-muted); }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect } = React;
const h = React.createElement;

const API_BASE = '';

function App() {
  const [data, setData] = useState(null);
  const [convergenceData, setConvergenceData] = useState(null);
  const [searchResults, setSearchResults] = useState(null);
  const [searchQuery, setSearchQuery] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  // Load dashboard and recommendations on mount
  const fetchAll = async () => {
    setLoading(true);
    setError(null);
    try {
      const [dashRes, convRes] = await Promise.all([
        fetch(API_BASE + '/api/dashboard'),
        fetch(API_BASE + '/api/recommendations')
      ]);
      if (!dashRes.ok) throw new Error('Dashboard HTTP ' + dashRes.status);
      const dashJson = await dashRes.json();
      setData(dashJson);
      if (convRes.ok) {
        const convJson = await convRes.json();
        setConvergenceData(convJson);
      } else {
        setConvergenceData([]);
      }
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  // Search function
  const runSearch = async () => {
    if (!searchQuery.trim()) return;
    setLoading(true);
    setError(null);
    try {
      const res = await fetch(API_BASE + '/api/search?q=' + encodeURIComponent(searchQuery.trim()));
      if (!res.ok) throw new Error('Search HTTP ' + res.status);
      const json = await res.json();
      setSearchResults(json);
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => { fetchAll(); }, []);

  const cheapnessBadge = (value) => {
    if (value === null || value === undefined) return h('span', { className: 'cheap-badge neutral' }, '—');
    const rounded = value.toFixed(1);
    let cls = 'neutral';
    let label = rounded + '%';
    if (value < -20) { cls = 'very-cheap'; label = '🔽 ' + rounded + '%'; }
    else if (value < -5) { cls = 'cheap'; label = '⬇️ ' + rounded + '%'; }
    else if (value > 20) { cls = 'expensive'; label = '🔼 ' + rounded + '%'; }
    else { cls = 'neutral'; label = '➡️ ' + rounded + '%'; }
    return h('span', { className: 'cheap-badge ' + cls }, label);
  };

  const ratingBadge = (rating) => {
    if (!rating || rating === 'N/A') return h('span', { className: 'rating-badge na' }, 'N/A');
    const cls = rating.toLowerCase().replace(' ', '-');
    return h('span', { className: 'rating-badge ' + cls }, rating);
  };

  if (loading && !data) return h('div', { className: 'wrap' }, 'Loading live data…');
  if (error) return h('div', { className: 'wrap' }, h('div', { className: 'error-box' }, 'Error: ' + error));
  if (!data) return h('div', { className: 'wrap' }, 'No data');

  const { sectors, currencies, commodities } = data;

  // Helper: render a table of stocks (for search results)
  const renderStockTable = (stocks) => {
    if (!stocks || stocks.length === 0) return null;
    return h('table', { className: 'stock-table' },
      h('thead', null,
        h('tr', null,
          h('th', 'Ticker'), h('th', 'Name'), h('th', 'Price'),
          h('th', 'P/E'), h('th', 'P/B'), h('th', 'Rating'), h('th', 'Insider %')
        )
      ),
      h('tbody', null,
        stocks.map((s, i) =>
          h('tr', { key: i },
            h('td', null, s.ticker),
            h('td', { className: 'tname' }, s.name || s.ticker),
            h('td', null, s.price ? '$' + s.price : '—'),
            h('td', null, s.pe ?? '—'),
            h('td', null, s.pb ?? '—'),
            h('td', { className: 'rating-badge ' + (s.rating ? s.rating.toLowerCase().replace(' ', '-') : 'na') }, s.rating || 'N/A'),
            h('td', null, s.insider ? s.insider + '%' : '—')
          )
        )
      )
    );
  };

  const children = [
    h('div', { className: 'masthead', key: 'masthead' },
      h('div', null, h('div', { className: 'kicker' }, 'Global Macro Deep Value Screen'), h('h1', null, 'Value Desk')),
      h('div', { className: 'masthead-actions' },
        h('div', { className: 'meta' }, 'Live ranking based on gold-adjusted historical deviation + analyst ratings'),
        h('button', { className: 'run', onClick: fetchAll, disabled: loading }, 'REFRESH ALL')
      )
    ),

    // ---- Search Bar ----
    h('div', { className: 'search-bar', key: 'search' },
      h('input', {
        type: 'text',
        placeholder: 'Search ticker, sector, currency, commodity… e.g. AAPL, XLF, JPY, Gold',
        value: searchQuery,
        onChange: (e) => setSearchQuery(e.target.value),
        onKeyDown: (e) => { if (e.key === 'Enter') runSearch(); }
      }),
      h('button', { className: 'go', onClick: runSearch, disabled: loading }, 'SEARCH')
    ),

    // ---- Search Results (if any) ----
    searchResults && (searchResults.stocks?.length || searchResults.sectors?.length || searchResults.etfs?.length || searchResults.currencies?.length || searchResults.commodities?.length) ? h('section', { className: 'block', key: 'searchResults' },
      h('h2', { className: 'section-title' }, 'Search Results'),
      searchResults.stocks && searchResults.stocks.length > 0 ? h('div', null,
        h('h3', { style: { color: 'var(--gold)' } }, 'Stocks'),
        renderStockTable(searchResults.stocks)
      ) : null,
      searchResults.sectors && searchResults.sectors.length > 0 ? h('div', null,
        h('h3', { style: { color: 'var(--gold)' } }, 'Sectors'),
        h('table', { className: 'stock-table' },
          h('thead', null, h('tr', null, h('th', 'Sector'), h('th', 'ETF'), h('th', 'Avg P/E'))),
          h('tbody', null, searchResults.sectors.map((s, i) =>
            h('tr', { key: i },
              h('td', null, s.name),
              h('td', null, s.etf),
              h('td', null, s.avg_pe ?? '—')
            )
          ))
        )
      ) : null,
      searchResults.etfs && searchResults.etfs.length > 0 ? h('div', null,
        h('h3', { style: { color: 'var(--gold)' } }, 'ETFs'),
        h('table', { className: 'stock-table' },
          h('thead', null, h('tr', null, h('th', 'Ticker'), h('th', 'Sector'), h('th', 'Holdings'))),
          h('tbody', null, searchResults.etfs.map((e, i) =>
            h('tr', { key: i },
              h('td', null, e.ticker),
              h('td', null, e.sector),
              h('td', null, (e.holdings || []).map(h => h.ticker).join(', '))
            )
          ))
        )
      ) : null,
      searchResults.currencies && searchResults.currencies.length > 0 ? h('div', null,
        h('h3', { style: { color: 'var(--gold)' } }, 'Currencies'),
        h('table', { className: 'stock-table' },
          h('thead', null, h('tr', null, h('th', 'Code'), h('th', 'Name'), h('th', 'Rate vs USD'))),
          h('tbody', null, searchResults.currencies.map((c, i) =>
            h('tr', { key: i },
              h('td', null, c.code),
              h('td', null, c.name || c.code),
              h('td', null, c.rate_usd ?? '—')
            )
          ))
        )
      ) : null,
      searchResults.commodities && searchResults.commodities.length > 0 ? h('div', null,
        h('h3', { style: { color: 'var(--gold)' } }, 'Commodities'),
        h('table', { className: 'stock-table' },
          h('thead', null, h('tr', null, h('th', 'Name'), h('th', 'Price'), h('th', 'Gold Ratio'))),
          h('tbody', null, searchResults.commodities.map((c, i) =>
            h('tr', { key: i },
              h('td', null, c.name),
              h('td', null, c.price ? '$' + c.price : '—'),
              h('td', null, c.gold_ratio ? c.gold_ratio.toFixed(4) : '—')
            )
          ))
        )
      ) : null
    ) : null,

    // ---- Convergence Recommendations ----
    convergenceData && convergenceData.length > 0 ? h('section', { className: 'block', key: 'convergence' },
      h('h2', { className: 'section-title' },
        '🔥 Convergence Recommendations ',
        h('span', { className: 'num' }, '(sector + commodity + currency + analyst rating)')
      ),
      h('p', { className: 'section-sub' },
        'Sectors where the underlying ETF, its primary commodity, and its primary currency are all undervalued vs gold. ' +
        'Combined Score = average cheapness + rating bonus (Strong Buy: +15, Buy: +10, Hold: 0, Sell: -10, Strong Sell: -15). Lower is better.'
      ),
      h('table', { className: 'stock-table' },
        h('thead', null,
          h('tr', null,
            h('th', 'Sector'), h('th', 'ETF'), h('th', 'Combined Score'),
            h('th', 'Avg Cheap%'), h('th', 'Rating Bonus'), h('th', 'Analyst Rating'),
            h('th', 'Commodity'), h('th', 'Commodity Cheap%'),
            h('th', 'Currency'), h('th', 'Currency Cheap%')
          )
        ),
        h('tbody', null,
          convergenceData.map((row, i) => {
            const scoreColor = row.combined_score < -10 ? 'var(--cheap)' : (row.combined_score < 0 ? 'var(--gold)' : 'var(--rich)');
            return h('tr', { key: i },
              h('td', null, row.sector),
              h('td', null, row.etf),
              h('td', { style: { fontWeight: 'bold', color: scoreColor } }, row.combined_score.toFixed(1) + '%'),
              h('td', null, row.convergence_score?.toFixed(1) ?? '—'),
              h('td', null, row.rating_bonus !== undefined ? (row.rating_bonus > 0 ? '+' : '') + row.rating_bonus : '—'),
              h('td', null, ratingBadge(row.analyst_rating || 'N/A')),
              h('td', null, row.commodity || '—'),
              h('td', null, row.commodity_cheapness?.toFixed(1) ?? '—'),
              h('td', null, row.currency || '—'),
              h('td', null, row.currency_cheapness?.toFixed(1) ?? '—')
            );
          })
        )
      )
    ) : null,

    // ---- Sectors (with ratings) ----
    h('section', { className: 'block', key: 'sectors' },
      h('h2', { className: 'section-title' }, 'Sectors (Cheapest first) ', h('span', { className: 'num' }, 'vs. historical gold-ratio mean')),
      h('table', { className: 'stock-table' },
        h('thead', null, h('tr', null,
          h('th', 'Sector'), h('th', 'ETF'), h('th', 'Avg P/E'),
          h('th', 'Analyst Rating'), h('th', '# Analysts'),
          h('th', 'Cheapness')
        )),
        h('tbody', null,
          sectors.map((s, i) =>
            h('tr', { key: i },
              h('td', null, s.sector),
              h('td', null, s.etf),
              h('td', null, s.avg_pe ?? '—'),
              h('td', null, ratingBadge(s.analyst_rating || 'N/A')),
              h('td', null, s.analysts ?? '—'),
              h('td', null, cheapnessBadge(s.cheapness))
            )
          )
        )
      )
    ),

    // ---- Currencies ----
    h('section', { className: 'block', key: 'currencies' },
      h('h2', { className: 'section-title' }, 'Currencies (Cheapest first) ', h('span', { className: 'num' }, 'vs. historical gold-ratio mean')),
      h('table', { className: 'stock-table' },
        h('thead', null, h('tr', null, h('th', 'Code'), h('th', 'Name'), h('th', 'Rate vs USD'), h('th', 'Cheapness'))),
        h('tbody', null,
          currencies.map((c, i) =>
            h('tr', { key: i },
              h('td', null, c.code),
              h('td', null, c.name || c.code),
              h('td', null, c.rate_usd ?? '—'),
              h('td', null, cheapnessBadge(c.cheapness))
            )
          )
        )
      )
    ),

    // ---- Commodities ----
    h('section', { className: 'block', key: 'commodities' },
      h('h2', { className: 'section-title' }, 'Commodities (Cheapest first) ', h('span', { className: 'num' }, 'vs. historical gold-ratio mean')),
      h('table', { className: 'stock-table' },
        h('thead', null, h('tr', null, h('th', 'Name'), h('th', 'Price'), h('th', 'Gold Ratio'), h('th', 'Cheapness'))),
        h('tbody', null,
          commodities.map((c, i) =>
            h('tr', { key: i },
              h('td', null, c.name),
              h('td', null, c.price ? '$' + c.price : '—'),
              h('td', null, c.gold_ratio ? c.gold_ratio.toFixed(4) : '—'),
              h('td', null, cheapnessBadge(c.cheapness))
            )
          )
        )
      )
    ),

<!-- ---- FRED Economic Data ---- -->
<section class="block">
  <h2 class="section-title">FRED Economic Data <span class="num">(cheapness vs gold)</span></h2>
  <table class="stock-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Last Value</th>
        <th>Current Ratio</th>
        <th>Mean Ratio</th>
        <th>Cheapness</th>
      </tr>
    </thead>
    <tbody id="fred-table-body">
      <!-- populated by JavaScript -->
    </tbody>
  </table>
</section>
    
    h('div', { className: 'disclaimer', key: 'disc' },
      'Cheapness = deviation from 5‑year average of price/gold ratio. Negative = cheaper. Analyst ratings from Yahoo Finance.'
    )
  ];

  return h('div', { className: 'wrap' }, children);
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
